# Phantom Terminal Configuration - CRT Effects Disabled
# ====================================================

# Use any theme as the base
theme = "phosphor"

# Font size in points
font_size = 14.0

# Disable all CRT Shader Effects by setting them to 0.0
scanline_intensity = 0.0
bloom_intensity = 0.0
chromatic_aberration = 0.0
curvature = 0.0
vignette_intensity = 0.0
noise_intensity = 0.0